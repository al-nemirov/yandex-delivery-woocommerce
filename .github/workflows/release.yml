name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin zip
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -e
          STAGE="yandex-dostavka"
          rm -rf "$STAGE"
          mkdir "$STAGE"
          rsync -a \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.github' \
            --exclude='src' \
            --exclude='webpack.config.js' \
            --exclude='.babelrc' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='*.zip' \
            --exclude='includes/debug.log' \
            --exclude='debug.log' \
            --exclude='.DS_Store' \
            ./ "$STAGE/"
          zip -qr "yandex-dostavka-${REF_NAME}.zip" "$STAGE"
          ls -la "yandex-dostavka-${REF_NAME}.zip"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: yandex-dostavka-${{ github.ref_name }}.zip
          generate_release_notes: true
